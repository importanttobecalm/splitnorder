# ============================================================
# i18n KEY NAMING CONVENTION (BM470 Splitnorder Projesi)
# ------------------------------------------------------------
# Auth hata key'leri: auth.error.<EXCEPTION_NAME>
#   - EXCEPTION_NAME daima UPPER_SNAKE_CASE
#   - Controller'daki Model'e konulan "error" attribute'u
#     daima bu convention'a uymalıdır
#   - YENI bir Exception sınıfı eklenirken bu dosyaya da
#     karşılığı eklenmek ZORUNDADIR (I18nKeyContractTest doğrular)
# ============================================================

