# ===== Database Configuration =====
# Development: H2 in-memory database
db.driver=org.h2.Driver
db.url=jdbc:h2:mem:stemsepdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
db.username=sa
db.password=

# Production: Oracle Cloud MySQL (uncomment and fill in)
# db.driver=com.mysql.cj.jdbc.Driver
# db.url=jdbc:mysql://YOUR_ORACLE_CLOUD_IP:3306/stemsep?useSSL=true&serverTimezone=UTC
# db.username=stemsep_user
# db.password=YOUR_PASSWORD

# ===== Hibernate =====
hibernate.dialect=org.hibernate.dialect.H2Dialect
# hibernate.dialect=org.hibernate.dialect.MySQLDialect
hibernate.show_sql=true
hibernate.hbm2ddl.auto=update

# ===== c3p0 Connection Pool =====
c3p0.minPoolSize=5
c3p0.maxPoolSize=20
c3p0.acquireIncrement=1
c3p0.maxIdleTime=30000

# ===== File Storage =====
upload.directory=uploads
stems.directory=stems

# ===== Colab/Kaggle GPU API =====
colab.api.url=http://localhost:5000
